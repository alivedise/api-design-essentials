Problem:
  type: object
  properties:
    type:
      type: string
      format: uri-reference
      description: >
        A URI reference that uniquely identifies the problem type in the context of the provided API.
      default: 'about:blank'
      example: '/some/uri-reference'
    title:
      type: string
      description: >
        A short summary of the problem type. Written in English and readable for engineers, 
        usually not suited for non-technical stakeholders and not localized.
      example: some title for the error situation
    status:
      type: integer
      format: int32
      description: >
        The HTTP status code generated by the origin server for this occurrence of the problem.
      minimum: 100
      maximum: 600
      exclusiveMaximum: 600
    detail:
      type: string
      description: >
        A human-readable explanation specific to this occurrence of the problem, helping to 
        pinpoint the problem and providing advice on how to proceed. Written in English and 
        readable for engineers, usually not suited for non-technical stakeholders and not localized.
      example: some description for the error situation
    instance:
      type: string
      format: uri-reference
      description: >
        A URI reference that identifies the specific occurrence of the problem, e.g. by adding 
        a fragment identifier or sub-path to the problem type. May be used to locate the root 
        cause of this problem occurrence in the source code.
      example: '/some/uri-reference#specific-occurrence-context'
  required:
    - type
    - title
    - status

ValidationError:
  type: object
  properties:
    in:
      type: string
      enum: [header, body, query, path]
      description: The location where the error occurred.
    path:
      type: string
      description: JSON pointer (for errors in body) or parameter name.
    detail:
      type: string
      description: A detailed description of the error.
    details:
      type: array
      items:
        type: object
        properties:
          key:
            type: string
            description: A machine-readable error key.
          message:
            type: string
            description: A human-readable error message.
  required:
    - in
    - path
    - detail

ValidationErrorProblem:
  description: >
    Problem response for validation errors (400 Bad Request).
    Uses 'validationErrors' key to separate validation errors from other error types.
  allOf:
    - $ref: '#/Problem'
    - type: object
      required:
        - validationErrors
      properties:
        type:
          type: string
          example: "validation-error"
        status:
          type: integer
          example: 400
        title:
          type: string
          example: "Validation Error"
        detail:
          type: string
          example: "One or more fields are invalid."
        validationErrors:
          type: array
          description: >
            Array of validation error objects. Uses 'validationErrors' key instead of
            generic 'errors' to clearly separate validation errors from other error types.
          items:
            $ref: '#/ValidationError'


BadRequest:
  allOf:
    - $ref: '#/Problem'
    - properties:
        status:
          type: integer
          example: 400
        title:
          type: string
          example: "Bad Request"
        detail:
          type: string
          example: "The request could not be understood by the server due to malformed syntax."

Unauthorized:
  allOf:
    - $ref: '#/Problem'
    - properties:
        status:
          type: integer
          example: 401
        title:
          type: string
          example: "Unauthorized"
        detail:
          type: string
          example: "Authentication is required and has failed or has not yet been provided."

Forbidden:
  allOf:
    - $ref: '#/Problem'
    - properties:
        status:
          type: integer
          example: 403
        title:
          type: string
          example: "Forbidden"
        detail:
          type: string
          example: "The request was a valid request, but the server is refusing to respond to it."

NotFound:
  allOf:
    - $ref: '#/Problem'
    - properties:
        status:
          type: integer
          example: 404
        title:
          type: string
          example: "Not Found"
        detail:
          type: string
          example: "The requested resource could not be found but may be available in the future."

Conflict:
  allOf:
    - $ref: '#/Problem'
    - properties:
        status:
          type: integer
          example: 409
        title:
          type: string
          example: "Conflict"
        detail:
          type: string
          example: "The request could not be completed due to a conflict with the current state of the target resource."

UnsupportedMediaType:
  allOf:
    - $ref: '#/Problem'
    - properties:
        status:
          type: integer
          example: 415
        title:
          type: string
          example: "Unsupported Media Type"
        detail:
          type: string
          example: "The server does not support the media type transmitted in the request."

NotAcceptable:
  allOf:
    - $ref: '#/Problem'
    - properties:
        status:
          type: integer
          example: 406
        title:
          type: string
          example: "Not Acceptable"
        detail:
          type: string
          example: "The server cannot produce a response matching the request's Accept header."

UnprocessableEntity:
  allOf:
    - $ref: '#/Problem'
    - properties:
        status:
          type: integer
          example: 422
        title:
          type: string
          example: "Unprocessable Entity"
        detail:
          type: string
          example: "The server understands the content type of the request entity but was unable to process the contained instructions."

TooManyRequests:
  allOf:
    - $ref: '#/Problem'
    - properties:
        status:
          type: integer
          example: 429
        title:
          type: string
          example: "Too Many Requests"
        detail:
          type: string
          example: "The user has sent too many requests in a given amount of time."

InternalServerError:
  allOf:
    - $ref: '#/Problem'
    - properties:
        status:
          type: integer
          example: 500
        title:
          type: string
          example: "Internal Server Error"
        detail:
          type: string
          example: "The server has encountered a situation it doesn't know how to handle."

ServiceUnavailable:
  allOf:
    - $ref: '#/Problem'
    - properties:
        status:
          type: integer
          example: 503
        title:
          type: string
          example: "Service Unavailable"
        detail:
          type: string
          example: "The server is not ready to handle the request."

'400':
  description: Bad Request
  content:
    application/problem+json:
      schema:
        $ref: '#/BadRequest'

'401':
  description: Unauthorized
  content:
    application/problem+json:
      schema:
        $ref: '#/Unauthorized'

'403':
  description: Forbidden
  content:
    application/problem+json:
      schema:
        $ref: '#/Forbidden'

'404':
  description: Not Found
  content:
    application/problem+json:
      schema:
        $ref: '#/NotFound'

'406':
  description: Not Acceptable
  content:
    application/problem+json:
      schema:
        $ref: '#/NotAcceptable'

'409':
  description: Conflict
  content:
    application/problem+json:
      schema:
        $ref: '#/Conflict'

'415':
  description: Unsupported Media Type
  content:
    application/problem+json:
      schema:
        $ref: '#/UnsupportedMediaType'

'422':
  description: Unprocessable Entity
  content:
    application/problem+json:
      schema:
        $ref: '#/UnprocessableEntity'

'429':
  description: Too Many Requests
  content:
    application/problem+json:
      schema:
        $ref: '#/TooManyRequests'

'500':
  description: Internal Server Error
  content:
    application/problem+json:
      schema:
        $ref: '#/InternalServerError'

'503':
  description: Service Unavailable
  content:
    application/problem+json:
      schema:
        $ref: '#/ServiceUnavailable'